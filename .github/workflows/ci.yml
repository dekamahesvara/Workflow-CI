name: CI - Train and Build Model

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  train-and-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12.7"

      - run: |
          python -m pip install --upgrade pip
          pip install mlflow==2.19.0 pandas scikit-learn matplotlib

      - working-directory: MLProject
        run: mlflow run . --env-manager=local --experiment-name telco_churn_ci

      - working-directory: MLProject
        run: |
          RUN_ID=$(python -c "import mlflow; mlflow.set_tracking_uri('file:./mlruns'); runs = mlflow.search_runs(experiment_names=['telco_churn_ci']); print(runs.sort_values('start_time', ascending=False).iloc[0].run_id)")
          echo "RUN_ID=$RUN_ID" >> $GITHUB_ENV

      - run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add MLProject/mlruns
          git diff --staged --quiet && exit 0 || git commit -m "chore: CI retrain model [skip ci]"
          git push

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - working-directory: MLProject
        run: |
          mlflow models build-docker -m "runs:/${{ env.RUN_ID }}/model" -n "${{ secrets.DOCKERHUB_USERNAME }}/telco-churn-model" --env-manager local

      - run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/telco-churn-model
